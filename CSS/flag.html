<!DOCTYPE html>
<html lang="en">
<head>
    <title>Flag</title>
    <style>
    .flag{
        height:300px;
        width:300px;
        
        border:2px solid black;
    }
    .saffron{
        height:100px;
       
        background-color:orange;
    }
    .white{
        height:100px;
        background-color:white;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .green{
        height: 100px;
       
        background-color:green;
    }
    .ashoka{
        height:70px;
        width:70px;
        border:2px solid black;
        border-radius:50%;
    }
    </style>


</head>
<body>
    <div class="flag"> 
        <div class="saffron"> </div>
        <div class="white"> <div class="ashoka"></div> </div>
        <div class="green"></div>
    </div>   
       
    
</body>
</html>
