<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=45;
        let b=9;
        console.log(a+b);
        console.log(a-b);
        console.log(a*b);
        console.log(a/b);
        console.log(a%b);   

        let d=2;
        let e=4;
        console.log(2**4); //a to the power of d


        let h=7
        let k=h++
        console.log(h) //post increment
        console.log(k)

        let s=7
        let w=++s
        console.log(s) //pre increment
        console.log(w)


        //assignment operators
        sara=5;
        sara+=25
        console.log(sara) //30

        //comparasation operators
        console.log(5==5) //true
        console.log(10>5) //true
        console.log(5<10) //true
        console.log(5<=10) //true
        console.log(10>=5) //true
        console.log(5!=10) //true
        console.log("5"==5) //true
        console.log("5"===5) //false because === checks for value and data type both
        
        console.log(2!=6) //true
        
        

    </script>
</body>
</html>
