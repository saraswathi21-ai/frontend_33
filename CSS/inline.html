<!DOCTYPE html>
<html lang="en">
<head>
    <!-- CSS: Cascading Style Sheets -->
    <!-- 3 types of CSS: inline, internal, external -->
     <!-- This is an internal CSS example -->
      <link rel="stylesheet" href="external.css"> 
    <title>Document</title>
    <style>
   
    .sandeep{
        background-color: rgb(255, 0, 174);
        color: aqua;
    }
    #subash{
        background-color: skyblue;
        color:aliceblue;
        border: 2px solid black;
        
    }

    .sara{
        background-color: yellow;

    }
    </style>
</head>
<body>
    <!--<p style="background-color: yellow;color:aqua">Hello Sara!!</p>-->

     <p class="sara" id="chay">helo saraaaaaa </p>
     
    <h1 style="color: blue;">Whats upp :)!!</h1>
    <p class="sandeep">Hows your day going?</p>

</body>
</html>
