<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>z-index</title>
    <style>
        .box1{
            width: 200px;
            height: 200px;
            background-color:pink;
            position:absolute; 
            top:50px;
            left:50px;
            z-index:1;

            
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: red;
            position:absolute;
            top:90px;
            left:90px;
            z-index:4;
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: yellow;
            position:absolute;
            top:130px;
            left:130px;
            z-index:3;
            

           
        }
    </style>
</head>
<body>
    <div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
    </div>
    
</body>
</html>
